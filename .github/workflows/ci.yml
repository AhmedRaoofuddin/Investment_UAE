name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend · pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest (safety + agents + services + integration)
        run: pytest -q --tb=short --strict-markers

      - name: Safety-taxonomy gate
        # Safety tests MUST always pass — this is a hard gate.
        run: pytest -q -m safety --tb=short

  frontend-build:
    name: Frontend · tsc + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        env:
          BACKEND_URL: http://placeholder.local
          AUTH_SECRET: placeholder-for-build
          AUTH_URL: http://localhost:3000
          APP_ORIGIN: http://localhost:3000
          TOKEN_VAULT_MASTER_KEY: 00000000000000000000000000000000
        run: npm run build

  secrets-scan:
    name: Secrets · gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
