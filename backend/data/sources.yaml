# ──────────────────────────────────────────────────────────────────────────
# RSS / Atom feed sources for investment-signal scanning.
#
# All entries are DIRECT publisher feeds — Google News RSS entries were
# removed in Apr 2026 because their article URLs (news.google.com/rss/
# articles/CBMi…) started returning HTTP 400 server-side after Google's
# 2024 change to article-ID resolution, which meant we could never fetch
# og:image for those signals. Direct feeds either (a) embed images via
# media:content/media:thumbnail/enclosure, or (b) expose og:image on
# their article pages which our rss_aggregator enrichment step scrapes.
#
# Curated for MENA region + global expansion candidates. Weight drives
# the scoring bias; tags are informational for filtering downstream.
# ──────────────────────────────────────────────────────────────────────────

