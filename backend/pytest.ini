[pytest]
# Invest UAE backend test configuration.
#
# Tests are organised by layer:
#   tests/agents/     → unit tests for each ML/heuristic agent
#   tests/services/   → unit tests for pipeline stages (cache, RSS, geo, …)
#   tests/safety/     → UAE-grade safety taxonomy (sanctions, PEP, injection, PII, refusal)
#   tests/integration → end-to-end pipeline runs against fixture RSS payloads
#
# Every test is deterministic and offline-safe. No test should ever hit the
# live Anthropic API, a live RSS feed, or a live database. Fixtures live in
# `tests/fixtures/` and are committed alongside the tests.

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
    --showlocals

markers =
    integration: end-to-end pipeline runs (slower, still offline)
    safety: UAE-grade safety taxonomy assertions (must always pass)
    agent: individual agent unit test
    service: pipeline service unit test

filterwarnings =
    ignore::DeprecationWarning:feedparser.*
    ignore::DeprecationWarning:pydantic.*
