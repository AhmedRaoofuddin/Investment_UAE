<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 64" role="img" aria-label="Ministry of Investment | Invest UAE">
  <defs>
    <linearGradient id="goldStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9A878"/>
      <stop offset="100%" stop-color="#B6925E"/>
    </linearGradient>
  </defs>

  <!-- Left mark: stylised falcon-shield -->
  <g transform="translate(0, 6)">
    <path d="M26 0 L52 12 V30 C52 42 40 50 26 52 C12 50 0 42 0 30 V12 Z"
          fill="#0E1E3F" stroke="url(#goldStroke)" stroke-width="1.2"/>
    <path d="M26 8 L26 44 M14 18 L26 24 L38 18 M14 30 L26 36 L38 30"
          stroke="#C9A878" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    <circle cx="26" cy="14" r="2" fill="#C9A878"/>
  </g>

  <!-- Vertical separator -->
  <line x1="68" y1="10" x2="68" y2="54" stroke="#0E1E3F" stroke-opacity="0.18" stroke-width="1"/>

  <!-- Right wordmark -->
  <g transform="translate(82, 0)">
    <text x="0" y="26" font-family="Fraunces, 'Playfair Display', Georgia, serif" font-size="20" font-weight="500" fill="#0E1E3F" letter-spacing="0.5">
      Invest <tspan font-weight="600" fill="#0E1E3F">UAE</tspan>
    </text>
    <text x="0" y="46" font-family="Inter, system-ui, sans-serif" font-size="9.5" font-weight="500" fill="#5A6378" letter-spacing="2.4" text-transform="uppercase">
      MINISTRY OF INVESTMENT
    </text>
    <text x="0" y="60" font-family="Inter, system-ui, sans-serif" font-size="8.5" font-weight="500" fill="#B6925E" letter-spacing="2.0">
      SIGNAL · DETECTION · AI
    </text>
  </g>
